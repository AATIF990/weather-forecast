<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather Forecast</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #00a8e8 0%, #0091d5 100%);
      min-height: 100vh;
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 1000px;
      background: linear-gradient(135deg, #00a8e8 0%, #0091d5 100%);
      border-radius: 30px;
      padding: 50px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      position: relative;
      overflow: hidden;
    }

    .bg-pattern {
      position: absolute;
      opacity: 0.1;
      pointer-events: none;
    }

    .pattern-1 {
      top: 10%;
      right: 5%;
      width: 200px;
      height: 200px;
      border: 3px solid white;
      border-radius: 50%;
    }

    .pattern-2 {
      top: 15%;
      right: 15%;
      width: 150px;
      height: 150px;
      border: 2px solid white;
      border-radius: 50%;
    }

    .pattern-3 {
      bottom: 20%;
      left: 5%;
      width: 250px;
      height: 250px;
      border: 2px solid white;
      border-radius: 50%;
    }

    .pattern-4 {
      bottom: 30%;
      left: 15%;
      width: 180px;
      height: 180px;
      border: 3px solid white;
      border-radius: 50%;
    }

    .search-bar {
      margin-bottom: 30px;
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
      z-index: 10;
    }

    input[type="text"] {
      padding: 12px 25px;
      border: none;
      border-radius: 50px;
      width: 300px;
      font-size: 1rem;
      background: rgba(255, 255, 255, 0.95);
      color: #333;
      transition: all 0.3s ease;
    }

    input[type="text"]:focus {
      outline: none;
      background: white;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
    }

    button {
      padding: 12px 25px;
      border: none;
      border-radius: 50px;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-weight: 600;
      cursor: pointer;
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255, 255, 255, 0.3);
      transition: all 0.3s ease;
    }

    button:hover {
      background: rgba(255, 255, 255, 0.3);
      transform: translateY(-2px);
    }

    .content {
      position: relative;
      z-index: 5;
    }

    /* HEADER - LOCATION AND MAIN INFO */
    .header-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 60px;
      align-items: center;
      margin-bottom: 40px;
      color: white;
    }

    .location-date {
      padding-left: 20px;
    }

    .location-date h1 {
      font-size: 3rem;
      font-weight: 700;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .location-icon {
      font-size: 2rem;
    }

    .date-text {
      font-size: 1.2rem;
      margin-bottom: 5px;
      opacity: 0.95;
    }

    .day-text {
      font-size: 1.1rem;
      opacity: 0.85;
    }

    .weather-icon-container {
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
    }

    .weather-icon-main {
      font-size: 10rem;
      filter: drop-shadow(0 10px 30px rgba(0, 0, 0, 0.2));
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-20px); }
    }

    /* TEMPERATURE AND WEATHER INFO */
    .temp-weather-section {
      display: flex;
      align-items: flex-end;
      gap: 40px;
      margin-bottom: 40px;
      color: white;
    }

    .temp-box {
      display: flex;
      align-items: flex-start;
      gap: 15px;
    }

    .temp-icon {
      font-size: 3rem;
      margin-top: 5px;
    }

    .temp-display {
      display: flex;
      flex-direction: column;
    }

    .temperature {
      font-size: 4.5rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 5px;
    }

    .feels-like {
      font-size: 1.1rem;
      opacity: 0.9;
    }

    .weather-condition {
      font-size: 1.4rem;
      opacity: 0.95;
      min-width: 120px;
    }

    /* DETAILS GRID */
    .details-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 25px;
      color: white;
      margin-bottom: 40px;
      padding-right: 20px;
    }

    .detail-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 1.05rem;
    }

    .detail-label {
      display: flex;
      align-items: center;
      gap: 10px;
      opacity: 0.9;
    }

    .detail-icon {
      font-size: 1.3rem;
    }

    .detail-value {
      font-size: 1.2rem;
      font-weight: 600;
    }

    /* FORECAST SECTION */
    .forecast-section {
      margin-top: 40px;
      border-top: 1px solid rgba(255, 255, 255, 0.2);
      padding-top: 30px;
    }

    .forecast-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 15px;
    }

    .forecast-day {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 20px;
      padding: 20px 10px;
      text-align: center;
      color: white;
      transition: all 0.3s ease;
      cursor: pointer;
      border: 1px solid rgba(255, 255, 255, 0.15);
    }

    .forecast-day:hover {
      background: rgba(255, 255, 255, 0.2);
      transform: translateY(-10px);
    }

    .forecast-day-name {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 12px;
      opacity: 0.9;
    }

    .forecast-icon {
      font-size: 2.5rem;
      margin-bottom: 12px;
    }

    .forecast-temp {
      font-size: 1.2rem;
      font-weight: 700;
    }

    .forecast-temp-min {
      font-size: 0.9rem;
      opacity: 0.7;
      margin-top: 3px;
    }

    .error-message {
      background: rgba(255, 100, 100, 0.9);
      color: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      font-weight: 600;
      margin-bottom: 20px;
    }

    .loading {
      text-align: center;
      color: white;
      padding: 60px 20px;
    }

    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255, 255, 255, 0.3);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .container {
        padding: 40px;
      }

      .header-section {
        grid-template-columns: 1fr;
        gap: 30px;
        text-align: center;
      }

      .location-date {
        padding-left: 0;
      }

      .location-date h1 {
        justify-content: center;
        font-size: 2.5rem;
      }

      .weather-icon-main {
        font-size: 8rem;
      }

      .details-grid {
        padding-right: 0;
      }

      .forecast-grid {
        grid-template-columns: repeat(auto-fit, minmax(100px, 1fr));
      }
    }

    @media (max-width: 768px) {
      body {
        padding: 10px;
      }

      .container {
        padding: 30px 20px;
        border-radius: 20px;
      }

      input[type="text"] {
        width: 100%;
        max-width: 250px;
      }

      .header-section {
        gap: 20px;
        margin-bottom: 25px;
      }

      .location-date h1 {
        font-size: 1.8rem;
      }

      .date-text {
        font-size: 1rem;
      }

      .weather-icon-main {
        font-size: 6rem;
      }

      .temp-weather-section {
        gap: 20px;
        margin-bottom: 25px;
      }

      .temperature {
        font-size: 3rem;
      }

      .temp-icon {
        font-size: 2rem;
      }

      .details-grid {
        grid-template-columns: 1fr;
        gap: 15px;
      }

      .forecast-grid {
        grid-template-columns: repeat(auto-fit, minmax(80px, 1fr));
        gap: 10px;
      }

      .forecast-day {
        padding: 15px 8px;
      }

      .forecast-icon {
        font-size: 2rem;
        margin-bottom: 8px;
      }

      .pattern-1, .pattern-2, .pattern-3, .pattern-4 {
        display: none;
      }
    }

    @media (max-width: 480px) {
      .container {
        padding: 20px 15px;
      }

      .search-bar {
        flex-direction: column;
      }

      input[type="text"] {
        width: 100%;
      }

      button {
        width: 100%;
      }

      .location-date h1 {
        font-size: 1.5rem;
      }

      .temperature {
        font-size: 2.5rem;
      }

      .temp-weather-section {
        flex-direction: column;
        align-items: flex-start;
      }

      .weather-icon-main {
        font-size: 4.5rem;
      }

      .details-grid {
        grid-template-columns: 1fr;
        gap: 12px;
        margin-bottom: 20px;
      }

      .forecast-grid {
        grid-template-columns: repeat(auto-fit, minmax(70px, 1fr));
      }

      .forecast-day {
        padding: 12px 6px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <!-- Background Patterns -->
    <div class="bg-pattern pattern-1"></div>
    <div class="bg-pattern pattern-2"></div>
    <div class="bg-pattern pattern-3"></div>
    <div class="bg-pattern pattern-4"></div>

    <!-- Search Bar -->
    <div class="search-bar">
      <input 
        type="text" 
        id="cityInput" 
        placeholder="Search city..." 
        autocomplete="off"
      />
      <button onclick="searchWeather()">🔍 Search</button>
      <button onclick="getCurrentLocation()">📍 Location</button>
    </div>

    <!-- Content -->
    <div class="content" id="weatherContent">
      <div class="loading">
        <div class="spinner"></div>
        <div>Loading weather...</div>
      </div>
    </div>
  </div>

  <script>
    const API_KEY = '8a84dfee0f3abbd69d9f161390b8ea31';
    const BASE_URL = 'https://api.openweathermap.org/data/2.5';

    const weatherIcons = {
      '01d': '☀️',
      '01n': '🌙',
      '02d': '⛅',
      '02n': '☁️',
      '03d': '☁️',
      '03n': '☁️',
      '04d': '☁️',
      '04n': '☁️',
      '09d': '🌧️',
      '09n': '🌧️',
      '10d': '🌧️',
      '10n': '🌧️',
      '11d': '⛈️',
      '11n': '⛈️',
      '13d': '❄️',
      '13n': '❄️',
      '50d': '🌫️',
      '50n': '🌫️'
    };

    function getWeatherIcon(iconCode) {
      return weatherIcons[iconCode] || '🌤️';
    }

    function formatDate(timestamp) {
      const date = new Date(timestamp * 1000);
      const options = { month: 'long', day: 'numeric' };
      return date.toLocaleDateString('en-US', options);
    }

    function formatDay(timestamp) {
      const date = new Date(timestamp * 1000);
      const options = { weekday: 'long' };
      return date.toLocaleDateString('en-US', options);
    }

    function formatTime(timestamp) {
      const date = new Date(timestamp * 1000);
      return date.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    }

    function getDayShort(timestamp) {
      const date = new Date(timestamp * 1000);
      const options = { weekday: 'short' };
      return date.toLocaleDateString('en-US', options);
    }

    function getWindDirection(degrees) {
      const directions = ['N', 'NNE', 'NE', 'ENE', 'E', 'ESE', 'SE', 'SSE', 'S', 'SSW', 'SW', 'WSW', 'W', 'WNW', 'NW', 'NNW'];
      const index = Math.round(((degrees %= 360) < 0 ? degrees + 360 : degrees) / 22.5) % 16;
      return directions[index];
    }

    async function fetchWeather(lat, lon) {
      try {
        const currentResponse = await fetch(
          `${BASE_URL}/weather?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
        );
        const currentData = await currentResponse.json();

        if (!currentResponse.ok) {
          throw new Error(currentData.message || 'Weather data not found');
        }

        const forecastResponse = await fetch(
          `${BASE_URL}/forecast?lat=${lat}&lon=${lon}&appid=${API_KEY}&units=metric`
        );
        const forecastData = await forecastResponse.json();

        displayWeather(currentData, forecastData);
      } catch (error) {
        showError(error.message);
      }
    }

    async function searchWeather() {
      const city = document.getElementById('cityInput').value.trim();
      if (!city) {
        showError('Please enter a city name');
        return;
      }

      try {
        showLoading();
        
        const geoResponse = await fetch(
          `https://api.openweathermap.org/geo/1.0/direct?q=${city}&limit=1&appid=${API_KEY}`
        );
        const geoData = await geoResponse.json();

        if (geoData.length === 0) {
          throw new Error('City not found');
        }

        const { lat, lon } = geoData[0];
        fetchWeather(lat, lon);
      } catch (error) {
        showError(error.message);
      }
    }

    function getCurrentLocation() {
      if (!navigator.geolocation) {
        showError('Geolocation is not supported');
        return;
      }

      showLoading();
      navigator.geolocation.getCurrentPosition(
        (position) => {
          fetchWeather(position.coords.latitude, position.coords.longitude);
        },
        () => {
          showError('Unable to get your location');
        }
      );
    }

    function getNextDaysForecast(forecastData) {
      const dailyForecasts = {};

      forecastData.list.forEach((item) => {
        const date = new Date(item.dt * 1000).toLocaleDateString('en-US');
        
        if (!dailyForecasts[date]) {
          dailyForecasts[date] = {
            timestamp: item.dt,
            temps: [item.main.temp],
            icon: item.weather[0].icon
          };
        } else {
          dailyForecasts[date].temps.push(item.main.temp);
        }
      });

      return Object.values(dailyForecasts).slice(0, 7);
    }

    function displayWeather(current, forecast) {
      const container = document.getElementById('weatherContent');
      const dailyForecasts = getNextDaysForecast(forecast);
      const windDir = getWindDirection(current.wind.deg);

      container.innerHTML = `
        <!-- Header Section -->
        <div class="header-section">
          <div class="location-date">
            <h1>
              <span class="location-icon">📍</span>
              ${current.name}
            </h1>
            <div class="date-text">${formatDate(current.dt)}</div>
            <div class="day-text">${formatDay(current.dt)}</div>
          </div>
          <div class="weather-icon-container">
            <div class="weather-icon-main">${getWeatherIcon(current.weather[0].icon)}</div>
          </div>
        </div>

        <!-- Temperature and Weather -->
        <div class="temp-weather-section">
          <div class="temp-box">
            <div class="temp-icon">🌡️</div>
            <div class="temp-display">
              <div class="temperature">${Math.round(current.main.temp)}°</div>
              <div class="feels-like">Feels like ${Math.round(current.main.feels_like)}°</div>
            </div>
          </div>
          <div class="weather-condition">${current.weather[0].main}</div>
        </div>

        <!-- Details Grid -->
        <div class="details-grid">
          <div class="detail-item">
            <span class="detail-label">
              <span class="detail-icon">🌅</span>
              sunrise ${formatTime(current.sys.sunrise)}
            </span>
            <span class="detail-value"></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">
              <span class="detail-icon">🌇</span>
              sunset ${formatTime(current.sys.sunset)}
            </span>
            <span class="detail-value"></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">
              <span class="detail-icon">💧</span>
              ${current.main.humidity}%
            </span>
            <span class="detail-value"></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">
              <span class="detail-icon">💨</span>
              ${Math.round(current.wind.speed * 3.6)} km/h
            </span>
            <span class="detail-value"></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">
              <span class="detail-icon">🧭</span>
              ${windDir}
            </span>
            <span class="detail-value"></span>
          </div>
          <div class="detail-item">
            <span class="detail-label">
              <span class="detail-icon">⬇️</span>
              ${current.main.pressure} mb
            </span>
            <span class="detail-value"></span>
          </div>
        </div>

        <!-- Forecast Section -->
        <div class="forecast-section">
          <div class="forecast-grid">
            ${dailyForecasts.map((day) => `
              <div class="forecast-day">
                <div class="forecast-day-name">${getDayShort(day.timestamp)}</div>
                <div class="forecast-icon">${getWeatherIcon(day.icon)}</div>
                <div class="forecast-temp">${Math.round(Math.max(...day.temps))}°</div>
                <div class="forecast-temp-min">${Math.round(Math.min(...day.temps))}°</div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    function showLoading() {
      document.getElementById('weatherContent').innerHTML = `
        <div class="loading">
          <div class="spinner"></div>
          <div>Loading weather...</div>
        </div>
      `;
    }

    function showError(message) {
      document.getElementById('weatherContent').innerHTML = `
        <div class="error-message">⚠️ ${message}</div>
      `;
    }

    document.getElementById('cityInput').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') searchWeather();
    });

    window.addEventListener('load', () => {
      fetchWeather(40.7128, -74.0060); // New York
    });
  </script>
</body>
</html>
